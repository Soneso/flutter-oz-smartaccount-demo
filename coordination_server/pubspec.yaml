name: coordination_server
description: >-
  Standalone pure-Dart coordination service that brokers policy-rejected
  smart-account calls between the autonomous reference agent and the
  OpenZeppelin smart-account demo app (mobile and web).
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.9.0
dependencies:
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  uuid: ^4.5.3
dev_dependencies:
  test: ^1.31.0
  lints: ^6.1.0
