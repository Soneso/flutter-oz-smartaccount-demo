# Static analysis for the pure-Dart coordination_server package.
#
# Extends the recommended pure-Dart lint set. Zero warnings is the baseline.
include: package:lints/recommended.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Surface unused code and missing return types as build-blocking issues.
    unused_import: error
    unused_local_variable: error

linter:
  rules:
    always_declare_return_types: true
    avoid_redundant_argument_values: true
    cancel_subscriptions: true
    directives_ordering: true
    prefer_final_locals: true
    prefer_single_quotes: true
    unawaited_futures: true
